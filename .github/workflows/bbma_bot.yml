name: BBMA Bot — Siklus 1h Nyala / 4h Mati

# ─────────────────────────────────────────────────────────────
#  FIX ERROR 451: GitHub Actions pakai server Azure US → diblokir
#  Binance. Solusi: Tor proxy agar IP tampak dari negara lain.
# ─────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 5 * * *'
    - cron: '0 10 * * *'
    - cron: '0 15 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:

concurrency:
  group: bbma-bot-singleton
  cancel-in-progress: false

jobs:
  run-bot:
    name: Jalankan BBMA Bot (maks 60 menit)
    runs-on: ubuntu-latest
    timeout-minutes: 65

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dan jalankan Tor proxy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tor curl
          sudo service tor start
          echo "Menunggu Tor bootstrap..."
          for i in $(seq 1 30); do
            IP=$(curl --silent --max-time 5 --socks5-hostname 127.0.0.1:9050 \
                 https://check.torproject.org/api/ip 2>/dev/null || true)
            if echo "$IP" | grep -q '"IsTor":true'; then
              echo "Tor aktif: $IP"
              break
            fi
            echo "Tunggu Tor ($i/30)..."
            sleep 2
          done

      - name: Install library Python
        run: |
          pip install --upgrade pip
          pip install ccxt pandas mplfinance requests numpy websocket-client PySocks

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: bbma_data/
          key: bbma-state-${{ runner.os }}
          restore-keys: |
            bbma-state-

      - name: Jalankan bot via Tor (timeout 60 menit)
        env:
          BINANCE_API_KEY:    ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_COLOR:        '0'
          PYTHONUNBUFFERED:   '1'
          HTTP_PROXY:         'socks5h://127.0.0.1:9050'
          HTTPS_PROXY:        'socks5h://127.0.0.1:9050'
          ALL_PROXY:          'socks5h://127.0.0.1:9050'
        run: |
          echo "Bot mulai: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          timeout 3600 python bbma_bot_top100.py || true
          echo "Bot selesai: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Simpan state cache
        if: always()
        uses: actions/cache@v4
        with:
          path: bbma_data/
          key: bbma-state-${{ runner.os }}

      - name: Upload chart artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bbma-charts-${{ github.run_id }}
          path: bbma_charts/
          retention-days: 3
          if-no-files-found: ignore
